version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: node-nft-postgres
    environment:
      POSTGRES_USER: nft_admin
      POSTGRES_PASSWORD: nft_password
      POSTGRES_DB: nft_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nft_admin"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - node-nft-network
    restart: unless-stopped

  # Backend Service (NestJS) - Production
  backend:
    image: ploto/backend:zkpay
    # Uncomment to specify platform (amd64 or arm64)
    # platform: linux/amd64  # Use linux/arm64 for ARM servers (e.g., AWS Graviton, Apple Silicon)
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: node-nft-backend
    command: npm start
    env_file:
      - backend/.env
    environment:
      # Database - read from .env or use default
      DATABASE_URL: ${DATABASE_URL:-postgresql://nft_admin:nft_password@postgres:5432/nft_db}
      
      # JWT
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      
      # Contract Configuration (BSC Mainnet)
      NFT_MANAGER_ADDRESS: ${NFT_MANAGER_ADDRESS:-0xD9eA9F4B8F24872262568fB2C6133117EC02C774}
      ENCLAVE_TOKEN_ADDRESS: ${ENCLAVE_TOKEN_ADDRESS:-0xDA8cB40036ACA4994B95c0Ae7D41f8944f0B5011}
      USDT_TOKEN_ADDRESS: ${USDT_TOKEN_ADDRESS:-0x55d398326f99059fF775485246999027B3197955}
      # RewardVault (proxy address)
      REWARD_VAULT_ADDRESS: ${REWARD_VAULT_ADDRESS:-0xb34AF294558761dcD366ffe998759F2C9BC26a8A}
      RPC_URL: ${RPC_URL:-https://bsc-dataseed1.binance.org/}
      
      # Admin Private Key (for contract calls)
      # Read directly from backend/.env file via env_file above
      # If you need to override from shell environment, uncomment the line below:
      # ADMIN_PRIVATE_KEY: ${ADMIN_PRIVATE_KEY}
      
      # Service Port
      PORT: ${PORT:-4000}
      
      # CORS - Allow frontend domain and localhost for development
      FRONTEND_URL: ${FRONTEND_URL:-https://nodes.enclave-hq.com,http://localhost:4001,http://frontend:4001}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - node-nft-network
    restart: unless-stopped

  # Frontend Service (Next.js) - Production
  frontend:
    image: ploto/frontend:zkpay
    # Uncomment to specify platform (amd64 or arm64)
    # platform: linux/amd64  # Use linux/arm64 for ARM servers (e.g., AWS Graviton, Apple Silicon)
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Pass environment variables to build stage (BSC Mainnet)
        NEXT_PUBLIC_ENCLAVE_TOKEN_ADDRESS: ${NEXT_PUBLIC_ENCLAVE_TOKEN_ADDRESS:-0xDA8cB40036ACA4994B95c0Ae7D41f8944f0B5011}
        NEXT_PUBLIC_NODE_NFT_ADDRESS: ${NEXT_PUBLIC_NODE_NFT_ADDRESS:-0x6F0f5fE4B9FA05CA5C2690d4106F46Bf5e06629b}
        NEXT_PUBLIC_NFT_MANAGER_ADDRESS: ${NEXT_PUBLIC_NFT_MANAGER_ADDRESS:-0xD9eA9F4B8F24872262568fB2C6133117EC02C774}
        NEXT_PUBLIC_USDT_ADDRESS: ${NEXT_PUBLIC_USDT_ADDRESS:-0x55d398326f99059fF775485246999027B3197955}
        NEXT_PUBLIC_REWARD_VAULT_ADDRESS: ${NEXT_PUBLIC_REWARD_VAULT_ADDRESS:-0xb34AF294558761dcD366ffe998759F2C9BC26a8A}
        NEXT_PUBLIC_CHAIN_ID: ${NEXT_PUBLIC_CHAIN_ID:-56}
        NEXT_PUBLIC_RPC_URL: ${NEXT_PUBLIC_RPC_URL:-https://bsc-dataseed1.binance.org/}
        NEXT_PUBLIC_ENABLE_TESTNET: ${NEXT_PUBLIC_ENABLE_TESTNET:-false}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://nodes-back.enclave-hq.com/api}
    container_name: node-nft-frontend
    env_file:
      - frontend/.env.local
    environment:
      # Contract Addresses (BSC Mainnet)
      NEXT_PUBLIC_ENCLAVE_TOKEN_ADDRESS: ${NEXT_PUBLIC_ENCLAVE_TOKEN_ADDRESS:-0xDA8cB40036ACA4994B95c0Ae7D41f8944f0B5011}
      NEXT_PUBLIC_NODE_NFT_ADDRESS: ${NEXT_PUBLIC_NODE_NFT_ADDRESS:-0x6F0f5fE4B9FA05CA5C2690d4106F46Bf5e06629b}
      NEXT_PUBLIC_NFT_MANAGER_ADDRESS: ${NEXT_PUBLIC_NFT_MANAGER_ADDRESS:-0xD9eA9F4B8F24872262568fB2C6133117EC02C774}
      NEXT_PUBLIC_USDT_ADDRESS: ${NEXT_PUBLIC_USDT_ADDRESS:-0x55d398326f99059fF775485246999027B3197955}
        NEXT_PUBLIC_REWARD_VAULT_ADDRESS: ${NEXT_PUBLIC_REWARD_VAULT_ADDRESS:-0xb34AF294558761dcD366ffe998759F2C9BC26a8A}
      
      # Network Configuration (BSC Mainnet)
      NEXT_PUBLIC_CHAIN_ID: ${NEXT_PUBLIC_CHAIN_ID:-56}
      NEXT_PUBLIC_RPC_URL: ${NEXT_PUBLIC_RPC_URL:-https://bsc-dataseed1.binance.org/}
      
      # Feature Flags
      NEXT_PUBLIC_ENABLE_TESTNET: ${NEXT_PUBLIC_ENABLE_TESTNET:-false}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://nodes-back.enclave-hq.com/api}
      
      # Port Configuration
      PORT: ${PORT:-3002}
    ports:
      - "3002:3002"
    depends_on:
      - backend
    networks:
      - node-nft-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  node-nft-network:
    driver: bridge

